<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/main.js" defer></script>

</head>
<body>

    <header></header> <!--Contact Navigation Bar-->

    <main>

        <section class="hero contact-hero"><!--Contact Hero Section-->

            <h1 class="contact-heading">Contact Me</h1>
            <p class="contact-desc">If you liked what you saw and would like to work together,
                contact me through either of these methods!</p>

            <div class="contact-hero-btns">
                <button>Download CV</button>
            </div>

            <p class="contact-scroll">Scroll to Reveal more!</p>
            <img id="Arrow" src="../Images/arrow.png" alt="">

        </section>


        <section class="contact-form-section"><!--Contact Information-->

            <h2>Get in Touch!</h2>
            <p class="sub-p">
                Let me know how I can help!
            </p>

            <img id="email-logo" src="../Images/Email Logo.png" alt="email">

            <p class="email-p">Email Me:</p>

            <form class="contact-form">
                <input type="text" id="name" placeholder="Your Name">
                <textarea id="message" placeholder="Your Message"></textarea>
                <button type="submit">Submit</button>

            </form>


            <div>
                <h3>Connect with Me:</h3>
                <img class="Linked-Logo" src="../Images/LinkedIn Logo.png" alt="">
                <p>@KiranRamdass</p>
            </div>

        </section>

    </main>

    <footer><!--Footer-->
        <a href="https://www.linkedin.com/in/kiran-ramdass-a463453aa/" target="_blank">
            <img src="../Images/LinkedIn Logo.png" alt="LinkedIn" id="linkedin-button">
        </a>
        <p class="copyright">Copyright @ Kiran Ramdass</p>
    </footer>
    
</body>
</html>
